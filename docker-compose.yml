services:
  portfolio:
    build: .
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=file:./prisma/dev.db
    env_file:
      - .env.local
    volumes:
      # Persist the SQLite database outside the container
      - db-data:/app/prisma/prisma
    restart: unless-stopped

volumes:
  db-data:
